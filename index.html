<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" type="text/css" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="gameboard">
        <!-- add on fly -->
      </div>
      <div class="scoreboard">
        <div class="player-1">
          <div class="head">
            <p class="name">Player 1 (X)</p>
            <div class="placeholder">
              <div class="spinner"></div>
            </div>
          </div>
          <p class="value">0</p>
        </div>
        <div class="tie">
          <p class="name">Tie</p>
          <p class="value">0</p>
        </div>
        <div class="player-2">
          <div class="head">
            <p class="name">Player 2 (0)</p>
            <div class="placeholder">
              <div class="spinner"></div>
            </div>
          </div>
          <p class="value">0</p>
        </div>
      </div>
    </div>
  </body>
</html>
